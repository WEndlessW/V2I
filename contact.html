<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Formulář</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Kontaktní formulář</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">Domů</a></li>
        <li><a href="characters.html">Postavy</a></li>
    </ul>
</nav>

<main>

<h2>Vyplň formulář</h2>

<form>

    <label>Jméno:</label><br>
    <input type="text" name="jmeno"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email"><br><br>

    <label>Věk:</label><br>
    <input type="number" name="vek"><br><br>

    <label>Datum narození:</label><br>
    <input type="date" name="datum"><br><br>

    <label>Oblíbený žánr:</label><br>
    <select>
        <option>Akce</option>
        <option>Fantasy</option>
        <option>Komedie</option>
    </select><br><br>

    <label>Oblíbené anime:</label><br>
    <textarea rows="5" cols="30"></textarea><br><br>

    <label>
        <input type="checkbox"> Souhlasím s podmínkami
    </label><br><br>

    <input type="submit" value="Odeslat">

</form>

</main>

<footer>
    <p>Anime World formulář</p>
</footer>

</body>
</html>
