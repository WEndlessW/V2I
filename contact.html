<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime World - Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Anime World</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="characters.html">Characters</a>
      <a href="contact.html">Contact</a>
      <a href="https://www.crunchyroll.com/discover" target="_blank">Crunchyroll</a>
    </nav>
  </header>

  <main>
    <h2>Contact Form</h2>
    <p>Fill in the form to sign up.</p>

    <h3>Sign Up</h3>
    <form>
      <label for="username">Username:</label>
      <input type="text" id="username" name="username">

      <label for="email">Email:</label>
      <input type="email" id="email" name="email">

      <label for="password">Password:</label>
      <input type="password" id="password" name="password">

      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" name="dob">

      <label>Favorite Genre:</label>
      <label><input type="radio" name="genre" value="shonen"> Shonen</label>
      <label><input type="radio" name="genre" value="romance"> Romance</label>

      <label>Subscribe to newsletter:</label>
      <label><input type="checkbox" name="news"> Yes, sign me up</label>

      <button type="submit">Send</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 Anime World</p>
  </footer>

</body>
</html>
