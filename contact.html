<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Formulář</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container">
        <h1>Kontaktní formulář</h1>
        <p>Ukázka různých input polí</p>
    </div>
</header>

<nav>
    <div class="container">
        <ul>
            <li><a href="index.html">Domů</a></li>
            <li><a href="characters.html">Postavy</a></li>
        </ul>
    </div>
</nav>

<main class="container">

<section class="card">

<h2>Vyplň formulář</h2>

<form>

    <label for="jmeno">Jméno</label>
    <input type="text" id="jmeno" name="jmeno" placeholder="Zadej jméno">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Zadej email">

    <label for="vek">Věk</label>
    <input type="number" id="vek" name="vek">

    <label for="datum">Datum narození</label>
    <input type="date" id="datum" name="datum">

    <label for="zanr">Oblíbený žánr</label>
    <select id="zanr">
        <option>Akce</option>
        <option>Fantasy</option>
        <option>Komedie</option>
        <option>Sci-fi</option>
    </select>

    <label for="anime">Oblíbené anime</label>
    <textarea id="anime" rows="5" placeholder="Napiš své oblíbené anime"></textarea>

    <div class="checkbox">
        <input type="checkbox" id="souhlas">
        <label for="souhlas">Souhlasím s podmínkami</label>
    </div>

    <input type="submit" value="Odeslat">

</form>

</section>

</main>

<footer>
    <div class="container">
        <p>Anime World | Formulář</p>
    </div>
</footer>

</body>
</html>
